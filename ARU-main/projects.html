<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffadaa" />
    <title>Aru Projects</title>
    <link rel="stylesheet" href="projects-style.css" />
  </head>
  <body>
    <header>
      <div class="menu-trigger" onclick="window.toggleSidebar()">☰</div>
      <div class="header-info">
        <span id="view-title">PROJECT PORTFOLIO</span>
      </div>
    </header>

    <nav id="sidebar">
      <div class="sidebar-header">
        NAVIGATOR
        <span class="close-btn" onclick="window.toggleSidebar()">×</span>
      </div>
      <ul>
        <li><a href="index.html">📚 Syllabus Tracker</a></li>
        <li><a href="projects.html">🚀 Project Manager</a></li>
        <li><a href="internships.html">💼 Internships & Courses</a></li>
        <li><a href="books.html">📖 Book Vault</a></li>
        <li><a href="skills.html">⚡ Skills Matrix</a></li>
        <li><a href="habits.html">🔥 Habit Tracker</a></li>
        <li><a href="lib.html">✨ Library</a></li>
      </ul>
    </nav>

    <main id="app-content">
      <div class="list-header">
        <h1 style="margin: 0; font-size: 1.2rem; letter-spacing: -0.5px">
          All Projects
        </h1>
        <button class="add-btn" onclick="window.openModal()">+ New</button>
      </div>

      <div id="project-list"></div>
    </main>

    <div id="project-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal" onclick="window.closeModal()">×</span>
        <h2 id="form-title" style="margin-top: 0; font-size: 1.3rem">
          Project Details
        </h2>

        <label class="field-label">Project Title</label>
        <input
          type="text"
          id="proj-title"
          placeholder="e.g. Portfolio Website"
        />

        <label class="field-label">Technologies</label>
        <input type="text" id="proj-tech" placeholder="React, Node.js, etc." />

        <label class="field-label">Objectives</label>
        <textarea
          id="proj-todos"
          placeholder="What needs to be done?"
          rows="5"
        ></textarea>

        <div style="display: flex; gap: 10px; margin-bottom: 15px">
          <div style="flex: 1">
            <label class="field-label">Start Date</label>
            <input type="date" id="proj-start" />
          </div>
          <div style="flex: 1">
            <label class="field-label">End Date</label>
            <input type="date" id="proj-end" />
          </div>
        </div>

        <label class="field-label">Current Status</label>
        <select id="proj-status">
          <option value="not-started">🔴 Not Started</option>
          <option value="ongoing">🔵 Ongoing</option>
          <option value="completed">🟢 Completed</option>
        </select>

        <div style="display: flex; gap: 10px">
          <button
            class="btn-full"
            id="submit-btn"
            onclick="window.handleProjectSubmit()"
          >
            Save Changes
          </button>
          <button
            class="btn-delete-modal"
            id="delete-btn-modal"
            onclick="window.deleteActiveProject()"
          >
            🗑️
          </button>
        </div>
      </div>
    </div>

    <script src="projects.js"></script>
  </body>
</html>
