<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffadaa" />
    <title>Aru Monthly Habits</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="habits.css" />
  </head>
  <body>
    <header>
      <div class="menu-trigger" onclick="window.toggleSidebar()">☰</div>
      <div
        class="header-info"
        style="display: flex; align-items: center; gap: 15px"
      >
        <button class="nav-btn" onclick="window.changeMonth(-1)">‹</button>
        <span id="month-label" style="min-width: 120px; text-align: center"
          >MARCH 2026</span
        >
        <button class="nav-btn" onclick="window.changeMonth(1)">›</button>
      </div>
    </header>

    <nav id="sidebar">
      <div class="sidebar-header">
        NAVIGATOR
        <span class="close-btn" onclick="window.toggleSidebar()">×</span>
      </div>
      <ul>
        <li><a href="index.html">📚 Syllabus Tracker</a></li>
        <li><a href="projects.html">🚀 Project Manager</a></li>
        <li><a href="internships.html">💼 Internships & Courses</a></li>
        <li><a href="books.html">📖 Book Vault</a></li>
        <li><a href="skills.html">⚡ Skills Matrix</a></li>
        <li><a href="habits.html">🔥 Habit Tracker</a></li>
        <li><a href="lib.html">✨ Library</a></li>
      </ul>
    </nav>

    <main id="app-content">
      <div class="list-header">
        <h1 id="calendar-title" style="margin: 0; font-size: 1.1rem">
          Monthly Progress
        </h1>
        <button class="add-btn" onclick="window.openModal()">
          + New Habit
        </button>
      </div>
      <div id="habit-container"></div>
    </main>

    <div id="habit-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal" onclick="window.closeModal()">×</span>
        <h2 id="form-title" style="margin-top: 0; font-size: 1.3rem">
          Habit Settings
        </h2>
        <label class="field-label">Habit Name</label>
        <input
          type="text"
          id="habit-name"
          placeholder="e.g. Deep Work, Gym, No Sugar"
        />

        <div style="display: flex; gap: 10px; margin-top: 20px">
          <button
            class="btn-full"
            id="submit-btn"
            onclick="window.handleHabitSubmit()"
          >
            Save Habit
          </button>
          <button class="btn-delete-modal" onclick="window.deleteActiveHabit()">
            🗑️
          </button>
        </div>
      </div>
    </div>

    <script src="habits.js"></script>
  </body>
</html>
