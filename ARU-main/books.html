<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffadaa" />
    <title>Aru Book Vault</title>
    <link rel="stylesheet" href="books.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="menu-trigger" onclick="window.toggleSidebar()">☰</div>
      <div class="header-info"><span id="view-title">BOOK VAULT</span></div>
    </header>

    <nav id="sidebar">
      <div class="sidebar-header">
        NAVIGATOR
        <span class="close-btn" onclick="window.toggleSidebar()">×</span>
      </div>
      <ul>
        <li><a href="index.html">📚 Syllabus Tracker</a></li>
        <li><a href="projects.html">🚀 Project Manager</a></li>
        <li><a href="internships.html">💼 Internships & Courses</a></li>
        <li><a href="books.html">📖 Book Vault</a></li>
        <li><a href="skills.html">⚡ Skills Matrix</a></li>
        <li><a href="habits.html">🔥 Habit Tracker</a></li>
        <li><a href="lib.html">✨ Library</a></li>
      </ul>
    </nav>

    <main id="app-content">
      <div class="list-header">
        <h1 style="margin: 0; font-size: 1.2rem; letter-spacing: -0.5px">
          My Library
        </h1>
        <button class="add-btn" onclick="window.openModal()">+ Add Book</button>
      </div>

      <div id="book-list"></div>

      <hr
        style="border: 0; border-top: 1px solid var(--border); margin: 30px 0"
      />

      <div class="suggestions-section">
        <h2 style="font-size: 1rem; margin-bottom: 10px">Recommended Reads</h2>
        <div id="book-suggestions" class="suggestions-grid"></div>
      </div>
    </main>

    <div id="book-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal" onclick="window.closeModal()">×</span>
        <h2 id="form-title" style="margin-top: 0; font-size: 1.3rem">
          Book Details
        </h2>

        <label class="field-label">Book Title</label>
        <input type="text" id="book-name" placeholder="e.g. Clean Code" />

        <label class="field-label">Author</label>
        <input type="text" id="book-author" placeholder="Robert C. Martin" />

        <label class="field-label">Key Takeaways / Notes</label>
        <textarea
          id="book-notes"
          placeholder="What did you learn?"
          rows="4"
        ></textarea>

        <div style="display: flex; gap: 10px; margin-bottom: 15px">
          <div style="flex: 1">
            <label class="field-label">Rating</label>
            <select id="book-rating">
              <option value="5">⭐⭐⭐⭐⭐</option>
              <option value="4">⭐⭐⭐⭐</option>
              <option value="3">⭐⭐⭐</option>
              <option value="2">⭐⭐</option>
              <option value="1">⭐</option>
            </select>
          </div>
          <div style="flex: 1">
            <label class="field-label">Status</label>
            <select id="book-status">
              <option value="reading">🔵 Reading</option>
              <option value="finished">🟢 Finished</option>
              <option value="wishlist">🟡 Wishlist</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <button
            class="btn-full"
            id="submit-btn"
            onclick="window.handleBookSubmit()"
          >
            Save to Vault
          </button>
          <button
            class="btn-delete-modal"
            id="delete-btn-modal"
            onclick="window.deleteActiveBook()"
          >
            🗑️
          </button>
        </div>
      </div>
    </div>

    <script src="books.js"></script>
  </body>
</html>
