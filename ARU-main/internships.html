<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffadaa" />
    <title>Aru Internships</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="internships.css" />
  </head>
  <body>
    <header>
      <div class="menu-trigger" onclick="window.toggleSidebar()">☰</div>
      <div class="header-info">
        <span id="view-title">INTERNSHIP TRACKER</span>
      </div>
    </header>

    <nav id="sidebar">
      <div class="sidebar-header">
        NAVIGATOR
        <span class="close-btn" onclick="window.toggleSidebar()">×</span>
      </div>
      <ul>
        <li><a href="index.html">📚 Syllabus Tracker</a></li>
        <li><a href="projects.html">🚀 Project Manager</a></li>
        <li><a href="internships.html">💼 Internships & Courses</a></li>
        <li><a href="books.html">📖 Book Vault</a></li>
        <li><a href="skills.html">⚡ Skills Matrix</a></li>
        <li><a href="habits.html">🔥 Habit Tracker</a></li>
        <li><a href="lib.html">✨ Library</a></li>
      </ul>
    </nav>

    <main id="app-content">
      <div class="list-header">
        <h1 style="margin: 0; font-size: 1.2rem; letter-spacing: -0.5px">
          Applications & Experience
        </h1>
        <button class="add-btn" onclick="window.openModal()">+ Add</button>
      </div>

      <div id="intern-list"></div>
    </main>

    <div id="intern-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal" onclick="window.closeModal()">×</span>
        <h2 id="form-title" style="margin-top: 0; font-size: 1.3rem">
          Entry Details
        </h2>

        <label class="field-label">Company / Organization</label>
        <input
          type="text"
          id="int-company"
          placeholder="e.g. Google, Startup X"
        />

        <label class="field-label">Role / Position</label>
        <input type="text" id="int-role" placeholder="e.g. Software Intern" />

        <label class="field-label">Notes / Requirements</label>
        <textarea
          id="int-notes"
          placeholder="Tech stack required, interview notes, etc."
          rows="4"
        ></textarea>

        <div style="display: flex; gap: 10px; margin-bottom: 15px">
          <div style="flex: 1">
            <label class="field-label">Date Applied</label>
            <input type="date" id="int-date" />
          </div>
          <div style="flex: 1">
            <label class="field-label">Current Status</label>
            <select id="int-status">
              <option value="applied">🟡 Applied</option>
              <option value="interview">🔵 Interviewing</option>
              <option value="offered">🟢 Offered</option>
              <option value="rejected">🔴 Rejected</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 10px">
          <button
            class="btn-full"
            id="submit-btn"
            onclick="window.handleInternSubmit()"
          >
            Save Entry
          </button>
          <button
            class="btn-delete-modal"
            onclick="window.deleteActiveIntern()"
          >
            🗑️
          </button>
        </div>
      </div>
    </div>

    <script src="internships.js"></script>
  </body>
</html>
