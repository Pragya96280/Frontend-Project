<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffadaa" />
    <title>Cozy Nook | Study Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav id="sidebar">
      <div class="sidebar-header">
        ☁️ Navigator <span class="close-btn" onclick="toggleSidebar()">×</span>
      </div>
      <ul>
        <li><a href="index.html">📚 Syllabus Tracker</a></li>
        <li><a href="projects.html">🚀 Project Manager</a></li>
        <li><a href="internships.html">💼 Internships & Courses</a></li>
        <li><a href="books.html">📖 Book Vault</a></li>
        <li><a href="skills.html">⚡ Skills Matrix</a></li>
        <li><a href="habits.html">🔥 Habit Tracker</a></li>
        <li><a href="lib.html">✨ Library</a></li>
      </ul>
    </nav>

    <div class="main-content">
      <header class="dashboard-header">
        <div class="menu-trigger" onclick="toggleSidebar()">☰</div>
        <div class="welcome-text">
          <h1>Dashboard</h1>
          <p>Welcome back to Academic Roadmap Unit ✨</p>
        </div>
      </header>

      <section class="stat-card">
        <div class="stat-label">
          <span>Overall Progress</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-container">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </section>

      <div class="dashboard-grid">
        <div class="dashboard-section">
          <h2 class="section-title">Today's Little Missions</h2>
          <div class="todo-input-group">
            <input
              type="text"
              id="todo-input"
              placeholder="What's on your mind?..."
            />
            <button id="add-btn"><span>+</span></button>
          </div>
          <div id="daily-list"></div>
        </div>

        <div class="dashboard-section">
          <h2 class="section-title">Learning Path</h2>
          <div id="data-container"></div>
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
